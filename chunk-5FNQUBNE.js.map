<div class="section container skills">

  <div class="section-header centered" data-aos="fade-up">
    <span class="section-tag">Technical skills</span>
    <h2 class="section-title">My tech stack</h2>
    <p class="section-subtitle">
      Technologies and tools I use to build modern, scalable web applications.
    </p>
  </div>

  <div class="skills__groups">
    @for (group of skillGroups; track group.category) {
      <div class="skills__group" data-aos="fade-up" [attr.data-aos-delay]="60 * $index">

        <div class="skills__group-header">
          <div class="skills__group-icon" aria-hidden="true">
            <i [class]="group.icon"></i>
          </div>
          <h3 class="skills__group-title">{{ group.label }}</h3>
        </div>

        <div class="skills__grid" role="list" [attr.aria-label]="group.label + ' skills'">
          @for (skill of group.skills; track skill.name) {
            <div class="skill-chip" role="listitem">
              <i [class]="skill.icon + ' skill-chip__icon'" aria-hidden="true"></i>
              <span class="skill-chip__name">{{ skill.name }}</span>
            </div>
          }
        </div>

      </div>
    }
  </div>

</div>
